# Cloudflare Pages configuration for the Vanisha Crochet storefront.
# This file declares BINDINGS and NON-SECRET vars only. Secrets (listed below,
# never in this file) are set via `wrangler pages secret put <NAME>` or the
# Cloudflare dashboard → Pages project → Settings → Environment variables.

name = "vanisha-crochet"
compatibility_date = "2026-07-11"
pages_build_output_dir = "."

# ── Non-secret vars (safe to commit; mirror window.VC_CONFIG on the client) ──
[vars]
# Split so each integration can go live independently — e.g. real Bob Go
# delivery (real sandbox key set) while Paystack is still a placeholder key.
MOCK_PAYMENTS = "true"                       # Paystack — flip to "false" once real Paystack keys are in (handoff §7 checklist item 6)
MOCK_DELIVERY = "false"                      # Bob Go — real sandbox key is set (BOBGO_API_KEY secret), delivery runs for real
CURRENCY = "R"
CURRENCY_CODE = "ZAR"
STORE_NAME = "Vanisha Crochet"
ORDERS_FROM_EMAIL = "orders@vanishacrochet.co.za"
VANISHA_NOTIFY_EMAIL = ""                   # PASTE Vanisha's real inbox once known — order notifications go nowhere until set
SUPABASE_URL = "https://zcmabrdkrpgkzoclqozv.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjbWFicmRrcnBna3pvY2xxb3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTkwMzEsImV4cCI6MjA5ODI5NTAzMX0.AQWDf40v1ZTgN2nEdtzUcEXHssmFcQrkvaWV-em7p3E"  # public/publishable key — same one already in vanisha-crochet.html, not a secret
BOBGO_ENV = "sandbox"                       # "sandbox" or "production" — which Bob Go API base URL functions/_lib/bobgo.js calls

# Vanisha's actual collection/dispatch address — Bob Go has no pre-configured
# warehouse address on the account (checked /accounts), so real rate requests
# need this to compute a real "collection_address". PLACEHOLDER — real rates
# will be wrong/meaningless until these are filled in. (Irrelevant only if
# MOCK_DELIVERY is ever flipped back to "true".)
SHIP_FROM_STREET = ""
SHIP_FROM_SUBURB = ""
SHIP_FROM_CITY = ""
SHIP_FROM_PROVINCE = ""
SHIP_FROM_POSTAL = ""
SHIP_FROM_COUNTRY = "ZA"

# ── SECRETS — do NOT add these here. Create with:
#      wrangler pages secret put PAYSTACK_SECRET_KEY
#      wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY
#      wrangler pages secret put BOBGO_API_KEY
#    (or paste them into the dashboard's Environment variables screen as
#    "Encrypted" — never "Plaintext"). See the build summary for the exact
#    list and what each one is for.
